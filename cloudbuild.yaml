steps:
  # Step 1: Build backend API Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/api:v1.0.0'
      - '-t'
      - 'gcr.io/$PROJECT_ID/api:latest'
      - '-f'
      - 'apps/api/Dockerfile.prod'
      - '.'
    dir: '/'

  # Step 2: Push backend image to GCR
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/api:v1.0.0'
    waitFor: ['build-backend']

  # Step 3: Build frontend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/web:v1.0.0'
      - '-t'
      - 'gcr.io/$PROJECT_ID/web:latest'
      - '-f'
      - 'apps/web/Dockerfile.prod'
      - '.'
    dir: '/'

  # Step 4: Push frontend image to GCR
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/web:v1.0.0'
    waitFor: ['build-frontend']

  # Step 5: Deploy backend to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    id: 'deploy-backend'
    args:
      - 'run'
      - '--image=gcr.io/$PROJECT_ID/api:v1.0.0'
      - '--region=us-central1'
      - '--platform=managed'
      - '--memory=512Mi'
      - '--cpu=2'
      - '--port=8080'
      - '--allow-unauthenticated'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=us-central1'
    waitFor: ['push-backend']

  # Step 6: Deploy frontend to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    id: 'deploy-frontend'
    args:
      - 'run'
      - '--image=gcr.io/$PROJECT_ID/web:v1.0.0'
      - '--region=us-central1'
      - '--platform=managed'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--port=3000'
      - '--allow-unauthenticated'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=us-central1'
    waitFor: ['push-frontend']

images:
  - 'gcr.io/$PROJECT_ID/api:v1.0.0'
  - 'gcr.io/$PROJECT_ID/api:latest'
  - 'gcr.io/$PROJECT_ID/web:v1.0.0'
  - 'gcr.io/$PROJECT_ID/web:latest'

artifacts:
  objects:
    location: 'gs://${PROJECT_ID}_cloudbuild/artifacts'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  
timeout: '3600s'
