substitutions:
  _SERVICE_NAME: school-erp-api
  _REGION: asia-south1
  _IMAGE_NAME: school-erp-api

steps:
  # Build the current production API image from the repo-root monorepo context.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-api-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest'
      - '-f'
      - 'apps/api/Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-api-image-sha'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$SHORT_SHA'
    waitFor: ['build-api-image']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-api-image-latest'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest'
    waitFor: ['build-api-image']

  # Deploy the API only. Web hosting remains a later slice.
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-api'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$SHORT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '300'
      - '--concurrency'
      - '100'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '20'
      - '--set-env-vars'
      - 'NODE_ENV=production,AUTH_MODE=firebase,PORT=3000'
    waitFor: ['push-api-image-sha', 'push-api-image-latest']

images:
  - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
