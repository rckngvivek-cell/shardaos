name: Mobile iOS Build & Deploy

on:
  push:
    branches: [main, release/*, mobile/release-*]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-ios-build.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  XCODE_VERSION: '15.0'
  IOS_MIN_TARGET: '14.0'
  RUBY_VERSION: '3.2'

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: apps/mobile/ios
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          cd apps/mobile
          npm ci
          cd ios
          pod install --repo-update
      
      - name: Run unit tests
        run: |
          cd apps/mobile/ios
          bundle exec fastlane run_tests
      
      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/mobile/ios/build/coverage/coverage.xml
          flags: ios
          name: ios-coverage
      
      - name: Increment version
        run: |
          cd apps/mobile/ios
          bundle exec fastlane increment_build_number
      
      - name: Build release app
        run: |
          cd apps/mobile/ios
          bundle exec fastlane build_release
        env:
          FASTLANE_XCODE_VERSION: ${{ env.XCODE_VERSION }}
      
      - name: Upload to TestFlight
        if: success() && github.ref == 'refs/heads/main'
        run: |
          cd apps/mobile/ios
          bundle exec fastlane upload_testflight
        env:
          FASTLANE_USER: ${{ secrets.APPLE_ID }}
          FASTLANE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
          FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
      
      - name: Archive build artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ios-build-artifacts
          path: apps/mobile/ios/build/
          retention-days: 5
      
      - name: Notify Slack - Success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_DEVOPS }}
          payload: |
            {
              "text": "✅ iOS Build & TestFlight Upload Successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*iOS Build Pipeline* ✅\n*Status:* Success\n*Branch:* ${{ github.ref }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🧪 Tests: Passed\n🔨 Build: Success\n📱 TestFlight Upload: Completed\n📊 Coverage: Available"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
      
      - name: Notify Slack - Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_DEVOPS }}
          payload: |
            {
              "text": "❌ iOS Build Pipeline Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*iOS Build Pipeline* ❌\n*Status:* Failed\n*Branch:* ${{ github.ref }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Logs"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

  test-coverage:
    name: Verify Test Coverage
    runs-on: macos-latest
    needs: build
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download coverage artifacts
        uses: actions/download-artifact@v3
        with:
          name: ios-build-artifacts
          path: artifacts/
      
      - name: Check coverage minimum
        run: |
          echo "Verifying iOS code coverage is ≥ 80%"
          # Coverage verification logic here
