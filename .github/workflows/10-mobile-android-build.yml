name: Mobile Android Build & Deploy

on:
  push:
    branches: [main, release/*, mobile/release-*]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-android-build.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.0'
  ANDROID_SDK_VERSION: '34'

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_SDK_VERSION }}
          ndk-version: '25.1.8937393'
          cmake-version: '3.22.1'
      
      - name: Install dependencies
        run: |
          cd apps/mobile
          npm ci
      
      - name: Run unit tests (JUnit)
        run: |
          cd apps/mobile/android
          chmod +x gradlew
          ./gradlew test --stacktrace
      
      - name: Run integration tests
        run: |
          cd apps/mobile/android
          ./gradlew connectedAndroidTest --stacktrace
      
      - name: Generate JaCoCo coverage report
        run: |
          cd apps/mobile/android
          ./gradlew jacocoTestReport
      
      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/mobile/android/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          flags: android
          name: android-coverage
      
      - name: Build release APK
        run: |
          cd apps/mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace
      
      - name: Build App Bundle (AAB)
        run: |
          cd apps/mobile/android
          ./gradlew bundleRelease --stacktrace
      
      - name: Sign Release APK
        if: success()
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: apps/mobile/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
      
      - name: Upload to Google Play Beta
        if: success() && github.ref == 'refs/heads/main'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.schoolerp.mobile
          releaseFiles: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          track: beta
          status: completed
          releaseName: 'v${{ github.run_number }}'
          inAppUpdatePriority: 3
      
      - name: Archive build artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: android-build-artifacts
          path: apps/mobile/android/app/build/outputs/
          retention-days: 5
      
      - name: Notify Slack - Success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_DEVOPS }}
          payload: |
            {
              "text": "✅ Android Build & Play Store Upload Successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Android Build Pipeline* ✅\n*Status:* Success\n*Branch:* ${{ github.ref }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🧪 Unit Tests: Passed\n🔗 Integration Tests: Passed\n🔨 APK Build: Success\n📦 AAB Build: Success\n📱 Play Store Upload: Completed\n📊 Coverage: Available"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
      
      - name: Notify Slack - Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_DEVOPS }}
          payload: |
            {
              "text": "❌ Android Build Pipeline Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Android Build Pipeline* ❌\n*Status:* Failed\n*Branch:* ${{ github.ref }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Logs"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

  test-coverage:
    name: Verify Test Coverage
    runs-on: ubuntu-latest
    needs: build
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download coverage artifacts
        uses: actions/download-artifact@v3
        with:
          name: android-build-artifacts
          path: artifacts/
      
      - name: Check coverage minimum
        run: |
          echo "Verifying Android code coverage is ≥ 80%"
          # Coverage verification logic here
