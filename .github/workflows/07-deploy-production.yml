name: 'Pipeline: Deploy to Production'

on:
  workflow_run:
    workflows: ['Pipeline: Deploy to Staging']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      approval:
        description: 'Production deployment approval'
        required: true
        type: choice
        options:
          - approved
          - rejected

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  approval-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check deployment approval
        if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
        run: |
          echo "✅ Deployment approved by CI pipeline"
          echo "Proceeding with production deployment"
      
      - name: Comment on PR
        if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Ready for production deployment. Awaiting approval...'
            });

  deploy-production-primary:
    runs-on: ubuntu-latest
    needs: approval-gate
    timeout-minutes: 45
    environment: production-primary
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure Docker
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Build Docker image
        run: |
          docker build -t asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/deerflow/backend:${{ github.sha }} \
            -t asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/deerflow/backend:prod-latest \
            -f Dockerfile .
      
      - name: Push Docker image
        run: |
          docker push asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/deerflow/backend:${{ github.sha }}
          docker push asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/deerflow/backend:prod-latest
      
      - name: Create backup of current revision
        run: |
          gcloud run services describe deerflow-backend-primary \
            --region=asia-south1 \
            --project=${{ secrets.GCP_PROJECT_ID }} > backup-revision.json
      
      - name: Deploy to Cloud Run (Primary - Asia South)
        run: |
          gcloud run deploy deerflow-backend-primary \
            --image=asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/deerflow/backend:${{ github.sha }} \
            --region=asia-south1 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars=ENVIRONMENT=production,LOG_LEVEL=INFO,COMMIT_SHA=${{ github.sha }} \
            --memory=2Gi \
            --cpu=2 \
            --timeout=300 \
            --min-instances=5 \
            --max-instances=200 \
            --port=8080 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --update-env-vars GCP_REGION=asia-south1
      
      - name: Run production smoke tests
        run: npm run test:smoke:production
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.PRODUCTION_PRIMARY_URL }}
      
      - name: Monitor deployment health (5 min)
        run: |
          for i in {1..30}; do
            curl -f ${{ secrets.PRODUCTION_PRIMARY_URL }}/health || (echo "Health check failed at attempt $i"; exit 1)
            sleep 10
          done
      
      - name: Archive production deployment
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: prod-primary-deployment-${{ github.sha }}
          path: backup-revision.json
          retention-days: 30

  deploy-production-secondary:
    runs-on: ubuntu-latest
    needs: deploy-production-primary
    timeout-minutes: 45
    environment: production-secondary
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Build and deploy (US Central)
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/deerflow/backend:${{ github.sha }} -f Dockerfile .
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/deerflow/backend:${{ github.sha }}
          
          gcloud run deploy deerflow-backend-secondary \
            --image=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/deerflow/backend:${{ github.sha }} \
            --region=us-central1 \
            --platform managed \
            --environment=production-secondary \
            --memory=2Gi --cpu=2 --min-instances=3 --max-instances=150 \
            --project=${{ secrets.GCP_PROJECT_ID }}

  deploy-production-tertiary:
    runs-on: ubuntu-latest
    needs: deploy-production-primary
    timeout-minutes: 45
    environment: production-tertiary
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure Docker
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Build and deploy (Europe West)
        run: |
          docker build -t europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/deerflow/backend:${{ github.sha }} -f Dockerfile .
          docker push europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/deerflow/backend:${{ github.sha }}
          
          gcloud run deploy deerflow-backend-tertiary \
            --image=europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/deerflow/backend:${{ github.sha }} \
            --region=europe-west1 \
            --platform managed \
            --environment=production-tertiary \
            --memory=2Gi --cpu=2 --min-instances=2 --max-instances=100 \
            --project=${{ secrets.GCP_PROJECT_ID }}

  post-deployment:
    runs-on: ubuntu-latest
    needs: [deploy-production-primary, deploy-production-secondary, deploy-production-tertiary]
    if: always()
    
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Generate deployment summary
        run: |
          echo "## Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Primary Region**: ${{ needs.deploy-production-primary.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Secondary Region**: ${{ needs.deploy-production-secondary.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tertiary Region**: ${{ needs.deploy-production-tertiary.result }}" >> $GITHUB_STEP_SUMMARY
      
      - name: notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production Deployment Complete",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚀 *Production Deployment Complete*\n*Commit*: ${{ github.sha }}\n*Status*: ${{ job.status }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
