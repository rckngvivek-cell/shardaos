name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Detect workspace scripts
        id: scripts
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const scripts = pkg.scripts || {};
          const out = {
            workspaces: Boolean(pkg.workspaces),
            lint: Boolean(scripts.lint),
            test: Boolean(scripts.test),
            build: Boolean(scripts.build)
          };
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `workspaces=${out.workspaces}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `lint=${out.lint}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `test=${out.test}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `build=${out.build}\n`);
          NODE

      - name: Lint
        if: steps.scripts.outputs.workspaces == 'true' && steps.scripts.outputs.lint == 'true'
        run: npm run lint

      - name: Test
        if: steps.scripts.outputs.workspaces == 'true' && steps.scripts.outputs.test == 'true'
        run: npm test

      - name: Build
        if: steps.scripts.outputs.workspaces == 'true' && steps.scripts.outputs.build == 'true'
        run: npm run build
