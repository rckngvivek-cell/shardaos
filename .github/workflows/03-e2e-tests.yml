name: 'Pipeline: E2E Tests (Web + Mobile)'

on:
  pull_request:
    branches: [main, develop]
  workflow_run:
    workflows: ['Pipeline: Integration Tests']
    types: [completed]

concurrency:
  group: e2e-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-web:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    permissions:
      contents: read
      checks: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Build application
        run: npm run build
        timeout-minutes: 10
      
      - name: Start test server
        run: npm run start:test &
        timeout-minutes: 5
      
      - name: Wait for server
        run: |
          npm install -g wait-on
          wait-on http://localhost:3000
        timeout-minutes: 2
      
      - name: Run Cypress E2E tests
        run: npm run test:e2e:web
        timeout-minutes: 30
        env:
          CYPRESS_BASE_URL: http://localhost:3000
      
      - name: Run Playwright E2E tests
        run: npm run test:e2e:playwright
        timeout-minutes: 30
        env:
          PLAYWRIGHT_TIMEOUT: 30000
      
      - name: Upload web E2E videos
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: web-e2e-videos
          path: |
            cypress/videos/
            test-results/
          retention-days: 14
      
      - name: Publish web E2E results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: 'Web E2E Test Results'
          path: 'cypress/results/results.xml'
          reporter: 'java-junit'
          fail-on-error: false

  e2e-mobile:
    runs-on: macos-latest
    timeout-minutes: 60
    
    permissions:
      contents: read
      checks: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Setup Java for Android
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Detox CLI
        run: npm install detox-cli
      
      - name: Build Detox app
        run: detox build-framework-cache --framework ios
        timeout-minutes: 15
      
      - name: Build React Native app
        run: npm run build:rn
        timeout-minutes: 20
      
      - name: Run Detox E2E tests (iOS)
        run: npm run test:e2e:ios
        timeout-minutes: 30
        env:
          DETOX_CONFIGURATION: ios.sim.release
      
      - name: Run Detox E2E tests (Android)
        run: npm run test:e2e:android || true
        timeout-minutes: 30
        continue-on-error: true
        env:
          DETOX_CONFIGURATION: android.emu.release
      
      - name: Upload mobile E2E data
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: mobile-e2e-data
          path: |
            artifacts/
            test-results/mobile/
          retention-days: 14
      
      - name: Publish mobile E2E results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: 'Mobile E2E Test Results'
          path: 'test-results/mobile/*.xml'
          reporter: 'java-junit'
          fail-on-error: false

  e2e-summary:
    runs-on: ubuntu-latest
    needs: [e2e-web, e2e-mobile]
    if: always()
    
    steps:
      - name: E2E Tests Summary
        run: |
          echo "## E2E Testing Complete"
          echo "- Web E2E: ${{ needs.e2e-web.result }}"
          echo "- Mobile E2E: ${{ needs.e2e-mobile.result }}"
        
      - name: Comment PR with E2E status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const webStatus = '${{ needs.e2e-web.result }}' === 'success' ? '✅' : '❌';
            const mobileStatus = '${{ needs.e2e-mobile.result }}' === 'success' ? '✅' : '❌';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## E2E Testing Results
              - Web E2E Tests ${webStatus}
              - Mobile E2E Tests ${mobileStatus}`
            });
