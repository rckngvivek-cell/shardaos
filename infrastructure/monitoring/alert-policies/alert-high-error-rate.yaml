displayName: "High Error Rate Alert (>0.1%)"
conditions:
  - displayName: "Error rate exceeds 0.1%"
    conditionThreshold:
      filter: 'metric.type="run.googleapis.com/request_count" AND metric.response_code_class="5xx"'
      comparison: COMPARISON_GT
      thresholdValue: 0.001
      duration: "300s"
      aggregations:
        - alignmentPeriod: "60s"
          perSeriesAligner: "ALIGN_RATE"
notificationChannels: []
alertStrategy:
  autoClose: "1800s"
enabled: true
