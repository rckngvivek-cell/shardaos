displayName: "High Latency Alert (P95 > 400ms)"
conditions:
  - displayName: "P95 latency exceeds 400ms"
    conditionThreshold:
      filter: 'metric.type="run.googleapis.com/request_latencies"'
      comparison: COMPARISON_GT
      thresholdValue: 400
      duration: "300s"
      aggregations:
        - alignmentPeriod: "60s"
          perSeriesAligner: "ALIGN_PERCENTILE_95"
notificationChannels: []
alertStrategy:
  autoClose: "1800s"
enabled: true
