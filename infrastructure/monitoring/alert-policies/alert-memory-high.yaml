displayName: "High Memory Usage Alert (>85%)"
conditions:
  - displayName: "Memory usage exceeds 85%"
    conditionThreshold:
      filter: 'metric.type="run.googleapis.com/memory_utilizations"'
      comparison: COMPARISON_GT
      thresholdValue: 85
      duration: "180s"
      aggregations:
        - alignmentPeriod: "60s"
          perSeriesAligner: "ALIGN_MEAN"
notificationChannels: []
alertStrategy:
  autoClose: "1200s"
enabled: true
